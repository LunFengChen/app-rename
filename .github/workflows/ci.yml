name: CI

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cargo fmt
        run: cargo fmt --check
      - name: Cargo test
        run: cargo test --locked

  build:
    name: Build ${{ matrix.target }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
            bin: app-rename
          - os: macos-13
            target: x86_64-apple-darwin
            archive: tar.gz
            bin: app-rename
          - os: macos-14
            target: aarch64-apple-darwin
            archive: tar.gz
            bin: app-rename
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
            bin: app-rename.exe
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build release
        run: cargo build --release --locked --target ${{ matrix.target }}
      - name: Package Unix
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.bin }}" dist/
          cp README.md LICENSE dist/
          tar -C dist -czf "app-rename-${{ matrix.target }}.tar.gz" .
          shasum -a 256 "app-rename-${{ matrix.target }}.tar.gz" > "app-rename-${{ matrix.target }}.tar.gz.sha256"
      - name: Package Windows
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.bin }}" dist/
          Copy-Item README.md, LICENSE dist/
          Compress-Archive -Path dist/* -DestinationPath "app-rename-${{ matrix.target }}.zip"
          (Get-FileHash "app-rename-${{ matrix.target }}.zip" -Algorithm SHA256).Hash.ToLower() + "  app-rename-${{ matrix.target }}.zip" | Out-File -Encoding ascii "app-rename-${{ matrix.target }}.zip.sha256"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-rename-${{ matrix.target }}
          path: |
            app-rename-${{ matrix.target }}.*

  release:
    name: GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          path: release-assets
          merge-multiple: true
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
